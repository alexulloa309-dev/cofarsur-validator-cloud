<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de Transfers - Cofarsur</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; color: white; margin-bottom: 30px; }
    .header h1 { font-size: 32px; margin-bottom: 10px; }
    .main-grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
    .panel { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
    .panel h2 { font-size: 20px; margin-bottom: 20px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
    .upload-area { border: 2px dashed #667eea; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; background: #f8f9ff; }
    .upload-area:hover { background: #e8ebff; }
    .upload-area input { display: none; }
    .file-info { background: #f0f0f0; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px; }
    .button-group { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover:not(:disabled) { background: #5568d3; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #ddd; color: #333; }
    .status-badge { padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 15px; width: 100%; text-align: center; background: #fff3cd; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-item { background: #f0f0f0; padding: 15px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #667eea; }
    .client-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
    .client-tab { padding: 8px 15px; border-radius: 20px; background: #f0f0f0; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; border: 2px solid transparent; }
    .client-tab.active { background: #667eea; color: white; }
    .search-box { margin-bottom: 15px; }
    .search-box input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .results-container { display: grid; grid-template-columns: 1fr; gap: 12px; max-height: 700px; overflow-y: auto; padding-right: 10px; }
    .result-item { border-left: 4px solid #28a745; padding: 12px; border-radius: 6px; background: #d4edda; }
    .result-item.warning { border-left-color: #ffc107; background: #fff3cd; }
    .result-item.error { border-left-color: #dc3545; background: #f8d7da; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .result-cliente { font-weight: 600; font-size: 13px; color: #333; }
    .estado { font-weight: 600; font-size: 11px; padding: 3px 8px; border-radius: 3px; background: rgba(0,0,0,0.1); }
    .result-details { font-size: 12px; color: #555; }
    .result-producto { font-weight: 500; margin-bottom: 6px; }
    .result-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; font-size: 11px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Validador de Transfers - Cofarsur</h1>
      <p>Validación de transfers con comparación de cantidades</p>
    </div>

    <div class="main-grid">
      <div class="panel">
        <h2>📂 Cargar Transfer Diario</h2>
        <div class="upload-area" id="uploadArea">
          <div style="font-size: 40px; margin-bottom: 10px;">📊</div>
          <div style="color: #666; font-size: 14px;">Arrastra tu archivo o <strong style="color: #667eea; cursor: pointer;">click aquí</strong></div>
          <input type="file" id="fileInput" accept=".xlsx,.xls" />
        </div>
        <div id="fileInfo" class="file-info" style="display: none;">
          <strong>Archivo:</strong> <span id="fileName"></span><br>
          <strong>Registros:</strong> <span id="recordCount">0</span>
        </div>
        <div id="statusBadge" class="status-badge">⏳ Selecciona un archivo</div>
        <div class="button-group">
          <button class="btn-primary" id="analyzeBtn" disabled>🔍 Analizar</button>
          <button class="btn-secondary" id="clearBtn">🗑️ Limpiar</button>
        </div>
      </div>

      <div class="panel">
        <h2>📊 Resultados</h2>
        <div class="stats-bar">
          <div class="stat-item"><div style="font-size: 12px; color: #666;">Total</div><div class="stat-value" id="statTotal">0</div></div>
          <div class="stat-item"><div style="font-size: 12px; color: #28a745;">✅ OK</div><div class="stat-value" id="statOk" style="color: #28a745;">0</div></div>
          <div class="stat-item"><div style="font-size: 12px; color: #ffc107;">⚠️ Adv</div><div class="stat-value" id="statWarn" style="color: #ffc107;">0</div></div>
          <div class="stat-item"><div style="font-size: 12px; color: #dc3545;">❌ Error</div><div class="stat-value" id="statError" style="color: #dc3545;">0</div></div>
        </div>

        <div id="clientTabs" class="client-tabs" style="display: none;"></div>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 Buscar cliente o producto...">
        </div>

        <div id="resultsContainer" class="results-container">
          <div class="empty-state">Los resultados aparecerán aquí</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SPECIAL_CLIENTS = {
      "MARCELLINO - TRF": ["BAGO S.A.", "MONTPELLIER S.A.", "ELEA S.A.", "MONTE VERDE S.A.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A."],
      "DEL SUBNIVEL - TRF": ["BAGO S.A.", "MONTPELLIER S.A.", "ELEA S.A.", "MONTE VERDE S.A.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A."],
      "NUEVA VILLA - DROGUERIA": ["ELEA S.A.", "BAGO S.A.", "ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "MEGALABS ARGENTINA S.A.U", "ASTRAZENECA", "GSK BIOPHARMA ARGENTINA S.A."],
      "SANCHEZ ANTONIOLLI IX": ["ELEA S.A.", "BAGO S.A.", "ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "MEGALABS ARGENTINA S.A.U", "ASTRAZENECA", "GSK BIOPHARMA ARGENTINA S.A."],
      "DROGUERIA LIDER - TRF": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BALIARDA S.A.", "PFIZER S.R.L."],
      "GRASSI SUC V TRANSFERS": ["ASPEN ARGENTINA S.A", "BAGO S.A.", "PFIZER S.R.L.", "CASASCO S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "BALIARDA S.A.", "ASTRAZENECA"],
      "HOSPITAL PRIVADO DROGUERIA (MED REP TARDE)": ["BAGO S.A.", "CASASCO S.A.", "POEN S.A.C.I.", "TEVA ARGENTINA"],
      "MARISA DI CARLO - MEDICARLO": ["ASPEN ARGENTINA S.A", "BAGO S.A.", "ELEA S.A.", "CASASCO S.A.", "GADOR S.A.", "GSK BIOPHARMA ARGENTINA S.A.", "BALIARDA S.A."],
      "RED COLON - TRF": ["ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A."],
      "RED PERSCE DROGUERIA - TRF": ["ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A."],
      "ESTRELLA DOCTA": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BAGO S.A.", "BALIARDA S.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "PFIZER S.R.L."],
      "DEL SUD S.A.": ["ASTRAZENECA"],
      "VIGLIOCCO - 9 DE JULIO": ["ASTRAZENECA", "BALIARDA S.A.", "CASASCO S.A.", "FINADIET SACIFI", "POEN S.A.C.I."],
      "SAN ISIDRO": ["ELEA S.A."],
      "FARMAFERRI": ["CASASCO S.A."],
      "SINDICAL SUTIAGA 3": ["TODOS LOS LABORATORIOS"],
      "TRAFUL": ["MONTE VERDE S.A."],
      "PODESTA - TRF": ["MONTE VERDE S.A."],
      "SVFARMA - ALTA CORDOBA (SV1)": ["ASPEN ARGENTINA S.A", "BAGO S.A.", "BALIARDA S.A.", "BAUSCH & LOMB ARGENTINA S.R.L.", "BETA S.A.I.C.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "GSK BIOPHARMA ARGENTINA S.A.", "MAX VISION SRL", "MONTE VERDE S.A.", "PFIZER S.R.L."],
      "SARMIENTO I - TRF": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BAGO S.A.", "BALIARDA S.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "PFIZER S.R.L."],
      "DIFARMA SALUD II": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BAGO S.A.", "BALIARDA S.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "PFIZER S.R.L."],
      "ALVEAR S.A.": ["TODOS LOS LABORATORIOS"]
    };

    let appState = { transfers: [], results: [], clientData: {}, activeFilter: '' };

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const searchInput = document.getElementById('searchInput');
    const clientTabsDiv = document.getElementById('clientTabs');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#e8ebff'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.background = '#f8f9ff');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.background = '#f8f9ff';
      fileInput.files = e.dataTransfer.files;
      handleFileSelect();
    });
    fileInput.addEventListener('change', handleFileSelect);
    analyzeBtn.addEventListener('click', analyzeTransfers);
    searchInput.addEventListener('input', filterResults);
    document.getElementById('clearBtn').addEventListener('click', () => location.reload());

    function handleFileSelect() {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result);
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws);
          appState.transfers = data;
          document.getElementById('fileName').textContent = file.name;
          document.getElementById('recordCount').textContent = data.length;
          document.getElementById('fileInfo').style.display = 'block';
          analyzeBtn.disabled = false;
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function analyzeTransfers() {
      if (appState.transfers.length === 0) return;
      analyzeBtn.disabled = true;

      setTimeout(() => {
        try {
          const results = [];
          const clientCounts = {};

          for (const [clienteName, allowedLabs] of Object.entries(SPECIAL_CLIENTS)) {
            const todosTodos = allowedLabs.includes('TODOS LOS LABORATORIOS');
            const clientRows = appState.transfers.filter(row => {
              const allValues = Object.values(row).map(v => String(v || '').toUpperCase());
              return allValues.some(val => val.includes(clienteName.toUpperCase()));
            });

            if (clientRows.length === 0) continue;
            clientCounts[clienteName] = clientRows.length;

            for (const row of clientRows) {
              const nroTransf = Object.values(row)[0] || '?';
              const laboratorio = row['Laboratorio'] || '';
              const producto = row['Producto'] || '';
              const ean = row['Cod. Laboratorio'] || row['EAN'] || '';
              const cantRecibida = parseInt(row['Cantidad'] || 0) || 0;

              let estado = 'OK';
              let diferencia = 0;
              let mensaje = '✓ Válido';

              if (!todosTodos && laboratorio) {
                const match = allowedLabs.find(l => 
                  laboratorio.toUpperCase().includes(l.toUpperCase()) || 
                  l.toUpperCase().includes(laboratorio.toUpperCase())
                );
                if (!match) {
                  estado = 'ERROR';
                  mensaje = `Lab "${laboratorio}" no permitido`;
                }
              }

              // COMPARAR CANTIDADES (simple: si no hay coincidencia, ERROR)
              if (cantRecibida === 0 && estado === 'OK') {
                estado = 'ERROR';
                diferencia = -100;
                mensaje = 'Cantidad recibida = 0';
              } else if (estado === 'OK') {
                diferencia = 0; // Sin datos maestros, no calcular
                mensaje = '✓ Laboratorio válido';
              }

              results.push({
                nro_transfer: nroTransf,
                cliente: clienteName,
                producto: producto,
                laboratorio: laboratorio,
                ean: ean,
                cantRecibida: cantRecibida,
                diferencia: diferencia,
                estado: estado,
                mensaje: mensaje
              });
            }
          }

          appState.results = results;
          appState.activeFilter = '';
          displayClientTabs(clientCounts);
          displayResults(results);

          const stats = {
            total: results.length,
            ok: results.filter(r => r.estado === 'OK').length,
            warn: results.filter(r => r.estado === 'ADVERTENCIA').length,
            error: results.filter(r => r.estado === 'ERROR').length
          };
          document.getElementById('statTotal').textContent = stats.total;
          document.getElementById('statOk').textContent = stats.ok;
          document.getElementById('statWarn').textContent = stats.warn;
          document.getElementById('statError').textContent = stats.error;

          document.getElementById('statusBadge').textContent = '✅ Análisis completo';
          analyzeBtn.disabled = false;

        } catch (err) {
          document.getElementById('statusBadge').textContent = '❌ Error: ' + err.message;
          analyzeBtn.disabled = false;
        }
      }, 100);
    }

    function displayClientTabs(counts) {
      clientTabsDiv.innerHTML = '';
      clientTabsDiv.style.display = 'flex';
      const uniqueClients = [...new Set(appState.results.map(r => r.cliente))].sort();
      uniqueClients.forEach(client => {
        const count = counts[client] || 0;
        const tab = document.createElement('div');
        tab.className = 'client-tab';
        tab.textContent = `${client} (${count})`;
        tab.addEventListener('click', () => {
          document.querySelectorAll('.client-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          appState.activeFilter = client;
          searchInput.value = '';
          filterResults();
        });
        clientTabsDiv.appendChild(tab);
      });
    }

    function filterResults() {
      const search = searchInput.value.toLowerCase();
      let filtered = appState.results;
      if (appState.activeFilter) filtered = filtered.filter(r => r.cliente === appState.activeFilter);
      if (search) filtered = filtered.filter(r => r.cliente.toLowerCase().includes(search) || r.producto.toLowerCase().includes(search));
      displayResults(filtered);
    }

    function displayResults(results) {
      resultsContainer.innerHTML = '';
      if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="empty-state">Sin resultados</div>';
        return;
      }
      results.forEach(r => {
        const cls = r.estado === 'OK' ? '' : r.estado === 'ADVERTENCIA' ? 'warning' : 'error';
        const html = `
          <div class="result-item ${cls}">
            <div class="result-header">
              <div class="result-cliente">#${r.nro_transfer} - ${r.cliente}</div>
              <span class="estado">${r.estado}</span>
            </div>
            <div class="result-details">
              <div class="result-producto">${r.producto}</div>
              <div class="result-info">
                <div><strong>Lab:</strong> ${r.laboratorio}</div>
                <div><strong>EAN:</strong> ${r.ean}</div>
              </div>
              <div class="result-info">
                <div><strong>Recibido:</strong> ${r.cantRecibida}</div>
                <div><strong>Diferencia:</strong> ${r.diferencia >= 0 ? '+' : ''}${r.diferencia.toFixed(1)}%</div>
              </div>
              <div style="margin-top: 6px; font-style: italic; opacity: 0.8;">${r.mensaje}</div>
            </div>
          </div>
        `;
        resultsContainer.innerHTML += html;
      });
    }
  </script>
</body>
</html>
