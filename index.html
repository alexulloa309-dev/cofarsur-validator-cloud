<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de Transfers - Cofarsur</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; color: white; margin-bottom: 40px; }
    .header h1 { font-size: 32px; margin-bottom: 10px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    .panel { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
    .panel h2 { font-size: 20px; margin-bottom: 20px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
    .upload-area { border: 2px dashed #667eea; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; background: #f8f9ff; }
    .upload-area:hover { background: #e8ebff; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-text { color: #666; font-size: 14px; }
    .upload-text strong { color: #667eea; cursor: pointer; }
    .status-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 15px; width: 100%; text-align: center; }
    .status-success { background: #d1e7dd; color: #0f5132; }
    .status-error { background: #f8d7da; color: #842029; }
    .file-info { background: #f0f0f0; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px; color: #333; }
    .file-name { font-weight: 600; color: #667eea; }
    .button-group { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover:not(:disabled) { background: #5568d3; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #ddd; color: #333; }
    .loading-spinner { display: none; text-align: center; padding: 20px; }
    .loading-spinner.show { display: block; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .results-container { display: grid; grid-template-columns: 1fr; gap: 15px; max-height: 600px; overflow-y: auto; padding-right: 10px; }
    .result-item { border-left: 4px solid; padding: 15px; border-radius: 6px; background: #f9f9f9; }
    .result-ok { border-left-color: #28a745; background: #d4edda; }
    .result-error { border-left-color: #dc3545; background: #f8d7da; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .result-cliente { font-weight: 600; font-size: 15px; color: #333; }
    .estado { font-weight: 600; font-size: 12px; padding: 4px 10px; border-radius: 4px; background: rgba(0, 0, 0, 0.1); }
    .result-details { font-size: 13px; color: #555; line-height: 1.6; }
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-item { background: #f0f0f0; padding: 15px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #667eea; }
    .stat-ok .stat-value { color: #28a745; }
    .stat-error .stat-value { color: #dc3545; }
    .empty-state { text-align: center; padding: 40px 20px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Validador de Transfers - Cofarsur</h1>
      <p>Sistema inteligente de validación de transfers</p>
    </div>

    <div class="main-grid">
      <div class="panel">
        <h2>📂 Cargar Transfer Diario</h2>
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📊</div>
          <div class="upload-text">Arrastra tu archivo Excel o <strong>click aquí</strong></div>
          <input type="file" id="fileInput" accept=".xlsx,.xls" />
        </div>
        <div id="fileInfo" class="file-info" style="display: none;">
          <strong>Archivo:</strong> <span class="file-name" id="fileName"></span><br>
          <strong>Registros:</strong> <span id="recordCount">0</span>
        </div>
        <div id="loadingSpinner" class="loading-spinner">
          <div class="spinner"></div>
          <p>Procesando...</p>
        </div>
        <div id="statusBadge" class="status-badge" style="background: #fff3cd; color: #856404;">
          ⏳ Selecciona un archivo
        </div>
        <div class="button-group">
          <button class="btn-primary" id="analyzeBtn" disabled>🔍 Analizar</button>
          <button class="btn-secondary" id="clearBtn">🗑️ Limpiar</button>
        </div>
      </div>

      <div class="panel">
        <h2>📊 Resultados</h2>
        <div class="stats-bar">
          <div class="stat-item">
            <div style="font-size: 12px; color: #666;">Total</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat-item stat-ok">
            <div style="font-size: 12px; color: #666;">✅ OK</div>
            <div class="stat-value" id="statOk">0</div>
          </div>
          <div class="stat-item stat-error">
            <div style="font-size: 12px; color: #666;">❌ Error</div>
            <div class="stat-value" id="statError">0</div>
          </div>
          <div class="stat-item">
            <div style="font-size: 12px; color: #666;">Clientes</div>
            <div class="stat-value" id="statClientes">0</div>
          </div>
        </div>
        <div id="resultsContainer" class="results-container">
          <div class="empty-state">Los resultados aparecerán aquí</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SPECIAL_CLIENTS = {
      "MARCELLINO - TRF": ["BAGO S.A.", "MONTPELLIER S.A.", "ELEA S.A.", "MONTE VERDE S.A.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A."],
      "DEL SUBNIVEL - TRF": ["BAGO S.A.", "MONTPELLIER S.A.", "ELEA S.A.", "MONTE VERDE S.A.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A."],
      "NUEVA VILLA - DROGUERIA": ["ELEA S.A.", "BAGO S.A.", "ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "MEGALABS ARGENTINA S.A.U", "ASTRAZENECA", "GSK BIOPHARMA ARGENTINA S.A."],
      "SANCHEZ ANTONIOLLI IX": ["ELEA S.A.", "BAGO S.A.", "ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A.", "CASASCO S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "MEGALABS ARGENTINA S.A.U", "ASTRAZENECA", "GSK BIOPHARMA ARGENTINA S.A."],
      "DROGUERIA LIDER - TRF": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BALIARDA S.A.", "PFIZER S.R.L."],
      "GRASSI SUC V TRANSFERS": ["ASPEN ARGENTINA S.A", "BAGO S.A.", "PFIZER S.R.L.", "CASASCO S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "BALIARDA S.A.", "ASTRAZENECA"],
      "HOSPITAL PRIVADO DROGUERIA (MED REP TARDE)": ["BAGO S.A.", "CASASCO S.A.", "POEN S.A.C.I.", "TEVA ARGENTINA"],
      "MARISA DI CARLO - MEDICARLO": ["ASPEN ARGENTINA S.A", "BAGO S.A.", "ELEA S.A.", "CASASCO S.A.", "GADOR S.A.", "GSK BIOPHARMA ARGENTINA S.A.", "BALIARDA S.A."],
      "RED COLON - TRF": ["ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A."],
      "RED PERSCE DROGUERIA - TRF": ["ASPEN ARGENTINA S.A", "PFIZER S.R.L.", "BALIARDA S.A."],
      "ESTRELLA DOCTA": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BAGO S.A.", "BALIARDA S.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "PFIZER S.R.L."],
      "DEL SUD S.A.": ["ASTRAZENECA"],
      "VIGLIOCCO - 9 DE JULIO": ["ASTRAZENECA", "BALIARDA S.A.", "CASASCO S.A.", "FINADIET SACIFI", "POEN S.A.C.I."],
      "SAN ISIDRO": ["ELEA S.A."],
      "FARMAFERRI": ["CASASCO S.A."],
      "SINDICAL SUTIAGA 3": ["TODOS LOS LABORATORIOS"],
      "TRAFUL": ["MONTE VERDE S.A."],
      "PODESTA - TRF": ["MONTE VERDE S.A."],
      "SVFARMA - ALTA CORDOBA (SV1)": ["ASPEN ARGENTINA S.A", "BAGO S.A.", "BALIARDA S.A.", "BAUSCH & LOMB ARGENTINA S.R.L.", "BETA S.A.I.C.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "GSK BIOPHARMA ARGENTINA S.A.", "MAX VISION SRL", "MONTE VERDE S.A.", "PFIZER S.R.L."],
      "SARMIENTO I - TRF": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BAGO S.A.", "BALIARDA S.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "MONTE VERDE S.A.", "PFIZER S.R.L."],
      "DIFARMA SALUD II": ["ASPEN ARGENTINA S.A", "ASTRAZENECA", "BAGO S.A.", "BALIARDA S.A.", "CASASCO S.A.", "ELEA S.A.", "GADOR S.A.", "PFIZER S.R.L."],
      "ALVEAR S.A.": ["TODOS LOS LABORATORIOS"]
    };

    let appState = { transfers: [], results: [] };

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultsContainer = document.getElementById('resultsContainer');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#e8ebff'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.background = '#f8f9ff');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.background = '#f8f9ff';
      fileInput.files = e.dataTransfer.files;
      handleFileSelect();
    });
    fileInput.addEventListener('change', handleFileSelect);
    analyzeBtn.addEventListener('click', analyzeTransfers);
    document.getElementById('clearBtn').addEventListener('click', () => location.reload());

    function handleFileSelect() {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result);
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws);
          appState.transfers = data;
          document.getElementById('fileName').textContent = file.name;
          document.getElementById('recordCount').textContent = data.length;
          document.getElementById('fileInfo').style.display = 'block';
          analyzeBtn.disabled = false;
          console.log('✅ Cargado:', data.length, 'transfers');
          console.log('Columns:', Object.keys(data[0] || {}));
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function analyzeTransfers() {
      if (appState.transfers.length === 0) return;

      showLoading(true);
      const results = [];
      let clientesCount = 0;

      setTimeout(() => {
        try {
          // PASO 1: Iterar cada cliente especial
          for (const [clienteName, allowedLabs] of Object.entries(SPECIAL_CLIENTS)) {
            const todosTodos = allowedLabs.includes('TODOS LOS LABORATORIOS');

            // PASO 2: Buscar TODOS los transfers de este cliente
            const clientRows = appState.transfers.filter(row => {
              const allValues = Object.values(row).map(v => String(v || '').toUpperCase());
              return allValues.some(val => val.includes(clienteName.toUpperCase()));
            });

            if (clientRows.length === 0) continue;
            clientesCount++;
            console.log(`✅ ${clienteName}: ${clientRows.length} transfers`);

            // PASO 3: Procesar cada transfer del cliente
            for (const row of clientRows) {
              const keys = Object.keys(row);
              const laboratorio = row['Laboratorio'] || row['laboratorio'] || '';
              const producto = row['Producto'] || row['producto'] || '';
              const ean = row['Cod. Laboratorio'] || row['Codigo_Laboratorio'] || row['EAN'] || '';

              let estado = 'OK';
              let mensaje = '✓ Válido';

              if (!todosTodos && laboratorio) {
                const match = allowedLabs.find(l => 
                  laboratorio.toUpperCase().includes(l.toUpperCase()) || 
                  l.toUpperCase().includes(laboratorio.toUpperCase())
                );
                if (!match) {
                  estado = 'ERROR';
                  mensaje = `Lab "${laboratorio}" no permitido`;
                }
              }

              results.push({
                cliente: clienteName,
                producto: producto,
                laboratorio: laboratorio,
                ean: ean,
                estado: estado,
                mensaje: mensaje
              });
            }
          }

          appState.results = results;
          displayResults(results);
          const stats = {
            total: results.length,
            ok: results.filter(r => r.estado === 'OK').length,
            error: results.filter(r => r.estado === 'ERROR').length,
            clientes: clientesCount
          };
          document.getElementById('statTotal').textContent = stats.total;
          document.getElementById('statOk').textContent = stats.ok;
          document.getElementById('statError').textContent = stats.error;
          document.getElementById('statClientes').textContent = stats.clientes;

          document.getElementById('statusBadge').className = 'status-badge status-success';
          document.getElementById('statusBadge').textContent = '✅ Análisis completo';
          console.log('✅ ANÁLISIS FINALIZADO:', stats);

        } catch (err) {
          console.error('Error:', err);
          document.getElementById('statusBadge').className = 'status-badge status-error';
          document.getElementById('statusBadge').textContent = '❌ Error: ' + err.message;
        } finally {
          showLoading(false);
        }
      }, 100);
    }

    function displayResults(results) {
      resultsContainer.innerHTML = '';
      if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="empty-state">Sin resultados</div>';
        return;
      }

      results.forEach(r => {
        const cls = `result-${r.estado.toLowerCase()}`;
        const html = `
          <div class="result-item ${cls}">
            <div class="result-header">
              <div class="result-cliente">${r.cliente}</div>
              <span class="estado">${r.estado}</span>
            </div>
            <div class="result-details">
              <div style="font-weight: 500; margin-bottom: 8px;">${r.producto}</div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px;">
                <div><div style="font-size: 12px; color: #777;">Lab:</div><div style="font-weight: 600;">${r.laboratorio}</div></div>
                <div><div style="font-size: 12px; color: #777;">EAN:</div><div style="font-weight: 600;">${r.ean}</div></div>
              </div>
              <div style="padding: 8px; background: rgba(0,0,0,0.05); border-radius: 4px; font-size: 12px; font-style: italic;">${r.mensaje}</div>
            </div>
          </div>
        `;
        resultsContainer.innerHTML += html;
      });
    }

    function showLoading(show) {
      document.getElementById('loadingSpinner').classList.toggle('show', show);
      analyzeBtn.disabled = show;
    }
  </script>
</body>
</html>
